<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Minorca">
  <meta name="theme-color" content="#1373E6">
  <meta name="description" content="Planner di viaggio Minorca — Son Parc, Giugno 2026.">

  <title>Minorca in Famiglia 🏝️</title>

  <!-- PWA: manifest e icone statiche -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-180.png">

  <!-- Fonts: il Service Worker li cacha al primo caricamento online,
       poi funzionano offline (stale-while-revalidate) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app"></div>

  <!-- Helpers PWA: install prompt, indicatore offline, download foto -->
  <script src="pwa.js" defer></script>

  <!-- App principale -->
  <script src="app.js" defer></script>

  <!-- Registrazione Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] SW registrato, scope:', reg.scope))
          .catch(err => console.warn('[PWA] SW non registrato:', err));
      });
    }
  </script>
</body>
</html>
