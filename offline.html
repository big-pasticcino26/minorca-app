<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1373E6">
  <title>Minorca — Offline</title>
  <style>
    :root { --bg:#F4F8FE; --primary:#1373E6; --text:#0E1B2C; --text2:#4A5567; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 420px; }
    .ico {
      width: 88px; height: 88px;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: var(--primary);
      display: grid; place-items: center;
      font-size: 48px;
      box-shadow: 0 20px 48px rgba(15,23,42,.18);
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -.01em; margin-bottom: 12px; }
    p  { font-size: 16px; line-height: 1.5; color: var(--text2); margin-bottom: 24px; }
    button {
      font: inherit; font-weight: 700;
      background: var(--primary); color: #fff;
      border: 0; border-radius: 14px;
      padding: 14px 28px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(19,115,230,.35);
    }
    button:active { transform: translateY(1px); }
    .hint { margin-top: 20px; font-size: 13px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="ico">📡</div>
    <h1>Sei offline</h1>
    <p>L'app non è ancora stata installata in cache su questo dispositivo. Connettiti a internet una volta e tutto funzionerà offline d'ora in poi.</p>
    <button onclick="location.reload()">Riprova</button>
    <div class="hint">Minorca · Giugno 2026</div>
  </div>
</body>
</html>
